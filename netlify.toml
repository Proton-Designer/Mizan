# Mizan repo: Vite app lives in mizan-app/
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "mizan-app"
  command = "npm ci && npm run build"
  publish = "dist"

# React Router (client-side routes): serve index.html for all paths
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
